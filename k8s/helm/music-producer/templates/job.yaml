{{/*
Job Template for Music Generation

This template is used to spawn K8s Jobs for batch music generation.
Jobs are created dynamically via the API server or manually.

Usage:
  helm template music-producer ./k8s/helm/music-producer \
    --set jobConfig.prompt="Create a lofi beat" \
    --set jobConfig.jobId="gen-12345" \
    -s templates/job.yaml
*/}}

{{- if .Values.jobs.generation.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "music-producer.fullname" . }}-generation-{{ .Values.jobConfig.jobId | default "template" }}
  labels:
    {{- include "music-producer.worker.labels" . | nindent 4 }}
    job-type: music-generation
spec:
  backoffLimit: {{ .Values.jobs.defaults.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.jobs.defaults.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.jobs.defaults.activeDeadlineSeconds }}
  parallelism: {{ .Values.jobs.generation.parallelism }}
  completions: {{ .Values.jobs.generation.completions }}
  template:
    metadata:
      labels:
        {{- include "music-producer.worker.selectorLabels" . | nindent 8 }}
        job-type: music-generation
    spec:
      {{- include "music-producer.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "music-producer.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.worker.priorityClassName }}
      priorityClassName: {{ .Values.worker.priorityClassName }}
      {{- end }}
      containers:
        - name: generator
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          args:
            - "--job-id={{ .Values.jobConfig.jobId | default "unknown" }}"
            - "--prompt={{ .Values.jobConfig.prompt | default "" }}"
            {{- if .Values.jobConfig.referenceFiles }}
            - "--references={{ .Values.jobConfig.referenceFiles }}"
            {{- end }}
            {{- if .Values.jobConfig.duration }}
            - "--duration={{ .Values.jobConfig.duration }}"
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "music-producer.fullname" . }}-config
            - secretRef:
                name: {{ include "music-producer.fullname" . }}-secrets
          env:
            - name: JOB_ID
              value: {{ .Values.jobConfig.jobId | default "unknown" | quote }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          resources:
            {{- toYaml .Values.jobs.generation.resources | nindent 12 }}
          volumeMounts:
            - name: output
              mountPath: /app/output
            - name: references
              mountPath: /app/references
            - name: model-cache
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: output
          {{- if .Values.persistence.output.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "music-producer.fullname" . }}-output
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: references
          {{- if .Values.persistence.references.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "music-producer.fullname" . }}-references
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: model-cache
          {{- if .Values.persistence.modelCache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "music-producer.fullname" . }}-model-cache
          {{- else }}
          emptyDir:
            sizeLimit: 50Gi
          {{- end }}
        - name: tmp
          emptyDir: {}
        # Shared memory for PyTorch DataLoader workers
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
