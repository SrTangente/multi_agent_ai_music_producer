# Multi-Agent AI Music Producer Configuration

llm:
  # Provider: anthropic | openai | huggingface | ollama
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 4096
  # For ollama or custom endpoints
  base_url: null

generation:
  max_retries: 3
  conditioning_tail_seconds: 5.0
  default_segment_duration: 15.0
  # MusicGen parameters
  musicgen_model: "facebook/musicgen-melody"
  temperature: 1.0
  top_k: 250
  cfg_coef: 3.0
  # Escalating constraints on retries
  retry_temperature_decay: 0.2  # Reduce temp by this on each retry
  retry_cfg_increase: 1.0       # Increase cfg_coef by this on each retry

audio:
  sample_rate: 32000
  output_format: "wav"
  crossfade_duration_ms: 500
  fade_in_duration_ms: 1000
  fade_out_duration_ms: 2000
  target_lufs: -14.0

logging:
  # Level: MINIMAL | STANDARD | VERBOSE | DEBUG
  level: "STANDARD"
  output_dir: "output/runs"

continuity:
  # How many seconds of the previous segment to use for conditioning
  tail_seconds: 5.0
  # Weights for selecting best reference track
  bpm_weight: 0.3
  key_weight: 0.3
  energy_weight: 0.2
  mood_weight: 0.2
